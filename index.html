<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rimiksha ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="./For Rimiksha ❤️_files/css2" rel="stylesheet">

<style>
:root {
    --bg-color: #fff0f5;
    --text-color: #4a0404;
    --accent-gold: #d4af37;
    --soft-pink: #ffb7b2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Montserrat', sans-serif;
    background:var(--bg-color);
    color:var(--text-color);
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1,h2 { font-family:'Great Vibes', cursive; }

#particles-container {
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

.heart {
    position:absolute;
    bottom:-20px;
    width:10px;
    height:10px;
    background:rgba(255,183,178,0.6);
    transform:rotate(45deg);
    animation:floatUp 6s linear forwards;
}

.heart:before,
.heart:after {
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:rgba(255,183,178,0.6);
    border-radius:50%;
}

.heart:before { top:-5px; left:0; }
.heart:after { left:-5px; top:0; }

@keyframes floatUp {
    0% { transform:translateY(0) scale(1); opacity:0.8; }
    100% { transform:translateY(-110vh) scale(1.5); opacity:0; }
}

.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: radial-gradient(circle at center, #fff0f5 0%, #ffdde1 100%);
    position:relative;
    z-index:2;
}

.hero h1 { font-size:5rem; margin-bottom:10px; }
.hero p { font-size:1.5rem; margin-bottom:40px; font-style:italic; }

.btn-glow {
    padding:15px 40px;
    font-size:1.1rem;
    background:linear-gradient(45deg,#b20a2c,#bd1f36);
    color:white;
    border:none;
    border-radius:50px;
    cursor:pointer;
}

.section {
    padding:80px 20px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:2;
}

.section-title {
    font-size:3rem;
    margin-bottom:50px;
}

.gallery-grid {
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
}

.polaroid {
    background:white;
    padding:15px 15px 40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:280px;
    text-align:center;
}

.polaroid img {
    width:100%;
    height:320px;
    object-fit:cover;
}

.caption {
    margin-top:15px;
    font-family:'Great Vibes', cursive;
    font-size:1.8rem;
}

#shayari-section {
    background:linear-gradient(to bottom,#2c0e0e,#4a0404);
    color:#ffdbe7;
}

.shayari-container {
    max-width:800px;
    text-align:center;
}

.wait-message {
    margin-bottom:40px;
    font-size:1.5rem;
}

.shayari-line {
    opacity:0;
    transform:translateY(20px);
    transition:1s;
    margin-bottom:20px;
    font-family:'Playfair Display', serif;
    font-size:1.7rem;
    line-height:1.6;
}

.shayari-line.show {
    opacity:1;
    transform:translateY(0);
}

#music-section { position:relative; }

.music-overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.music-message { color:white; font-size:1.8rem; text-align:center; }

.letter-container {
    max-width:700px;
    background:white;
    padding:50px;
    text-align:center;
}

.sign-off {
    font-family:'Great Vibes', cursive;
    font-size:3rem;
}

@media(max-width:768px){
    .hero h1 { font-size:3rem; }
    .section-title { font-size:2rem; }
    .polaroid { width:90%; }
}
</style>
</head>

<body>

<div id="particles-container"><div class="heart" style="left: 86.1119vw; animation-duration: 6.36491s;"></div><div class="heart" style="left: 22.3047vw; animation-duration: 5.40693s;"></div><div class="heart" style="left: 7.33093vw; animation-duration: 6.30434s;"></div><div class="heart" style="left: 51.4449vw; animation-duration: 6.24684s;"></div><div class="heart" style="left: 47.5691vw; animation-duration: 5.9653s;"></div><div class="heart" style="left: 81.2544vw; animation-duration: 6.38766s;"></div><div class="heart" style="left: 95.6355vw; animation-duration: 4.88058s;"></div><div class="heart" style="left: 19.8099vw; animation-duration: 6.67315s;"></div><div class="heart" style="left: 2.86075vw; animation-duration: 5.94906s;"></div><div class="heart" style="left: 85.2049vw; animation-duration: 5.39494s;"></div><div class="heart" style="left: 28.7624vw; animation-duration: 6.36668s;"></div><div class="heart" style="left: 76.139vw; animation-duration: 4.87425s;"></div><div class="heart" style="left: 23.8167vw; animation-duration: 4.48908s;"></div><div class="heart" style="left: 52.8913vw; animation-duration: 6.27704s;"></div><div class="heart" style="left: 32.2417vw; animation-duration: 5.51432s;"></div><div class="heart" style="left: 54.862vw; animation-duration: 4.34807s;"></div><div class="heart" style="left: 92.4965vw; animation-duration: 6.43416s;"></div></div>

<section class="hero">
<h1>For Rimiksha ❤️</h1>
<p>The One Who Owns My Heart</p>
<button class="btn-glow" onclick="scrollToSection(&#39;gallery&#39;)">Feel My Love</button>
</section>

<section id="gallery" class="section">
<h2 class="section-title">Moments of You</h2>
<div class="gallery-grid">
<div class="polaroid"><img src="y1.jpg"><div class="caption">Her Smile</div></div>
<div class="polaroid"><img src="y2.jpg"><div class="caption">My Peace</div></div>
<div class="polaroid"><img src="y3.jpg"><div class="caption">My Forever</div></div>
</div>
</section>

<section id="shayari-section" class="section">
<div class="shayari-container">
<div class="wait-message">Wait… and read slowly ❤️</div>
<div id="shayariContainer"></div>
</div>
</section>

<section id="music-section" class="section">
<div class="music-overlay" id="overlay">
<div class="music-message">
🎧 Plug in your earphones <br><br>
<button class="btn-glow" onclick="startMusic()">Play</button>
</div>
</div>
<audio id="loveSong" src="love.mp3"></audio>
</section>

<section class="section">
<div class="letter-container">
<div class="letter-text">
Rimiksha,<br><br>
I don’t just love you.  
I feel you in every heartbeat.  
And right now… I miss you more than words can explain.
</div>
<div class="sign-off">Forever Yours ❤️</div>
</div>
</section>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

const container = document.getElementById('particles-container');
function createHeart(){
const heart=document.createElement('div');
heart.classList.add('heart');
heart.style.left=Math.random()*100+'vw';
heart.style.animationDuration=(4+Math.random()*3)+'s';
container.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,400);

const shayaris=[
`🌸महंगी है तू कोहिनूर से भी, खूबसूरत है तू हूर से भी。
दूर से दिखते है चाँद में दाग, मगर बेदाग़ है तू पास से भी।🌸`,
`🌹सादगी में भी क़यामत का नूर लिए फिरती है,
छोटे बालों में वो शहज़ादी सा गुरूर लिए फिरती है。
न सोना चाहिए, न चाँदी का कोई सिंगार,
तू जैसी है वैसे ही है जन्नत का दीदार。
तेरी सादगी में वो कशिश है जो अदाओं में कहाँ,
तू ख़ुद एक शायरी है, तुझे लफ़्ज़ों की ज़रूरत कहाँ।🌹`,
`💖तू सामने नहीं, फिर भी दिल में बसी है कुछ इस तरह,
जैसे कोई खूबसूरत ख़्वाब आँखों में ठहर जाए रूह की तरह。
तेरा ख़याल सुबह की पहली किरण सा आता है,
आँख खुलते ही लबों पे सबसे पहले तेरा नाम आता है。
माना आज दूरियाँ हैं, पर ये दिल कहाँ मानता है?
तू पास नहीं, फिर भी ये धड़कन सिर्फ तुझे ही जानती है。
तेरी याद में एक अजीब-सी मिठास घुली रहती है,
तुझसे मिलने की एक तड़प मुझमें चुपचाप पली रहती है。
तू जान ले कि तू दूर होकर भी हर पल मेरे पास है,
हर सांस में तेरी खुशबू, हर लम्हे में तेरा ही एहसास है.🤌🏽🧿`
];

const shContainer=document.getElementById("shayariContainer");
let delay=0;

shayaris.forEach(text=>{
const lines=text.split("\n");
lines.forEach(line=>{
const p=document.createElement("p");
p.classList.add("shayari-line");
p.textContent=line;
shContainer.appendChild(p);
setTimeout(()=>p.classList.add("show"),delay);
delay+=1500;
});
delay+=2000;
});

function startMusic(){
document.getElementById("overlay").style.display="none";
document.getElementById("loveSong").play();
}
</script>


</body></html>
